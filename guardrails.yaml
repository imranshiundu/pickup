permissions:
  read_files: true
  write_files:
    allowed_paths:
      - ~/projects/
      - ~/Documents/
    blocked_paths:
      - ~/.ssh/
      - /etc/
      - ~/Library/Keychains/
  execute_commands: true
  allowed_commands:
    - git
    - npm
    - python
    - cargo
    - docker
  blocked_commands:
    - rm -rf
    - sudo
    - chmod 777
    - curl | bash
  require_confirmation_above: high  # low / medium / high / always
  max_api_cost_per_day: $2.00       # hard stop
  max_actions_per_hour: 50          # rate limit for agents
  notify_on_action: telegram        # ping you on every agent action
